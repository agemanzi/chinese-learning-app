server {
    listen 7432;

    root /usr/share/nginx/html;
    index index.html;

    __NGINX_AUTH__

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache audio files aggressively
    location ~* \.(mp3)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
