<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HSK 1 Toolkit</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D85A30">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HSK 1">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Long+Cang&family=Liu+Jian+Mao+Cao&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="auth-gate" style="display:none;position:fixed;inset:0;background:#faf9f7;z-index:9999;display:flex;align-items:center;justify-content:center">
  <form id="auth-form" style="display:flex;flex-direction:column;gap:1rem;width:260px">
    <div style="font-size:1.4rem;font-weight:600;text-align:center">HSK 1 Toolkit</div>
    <input id="auth-input" type="password" placeholder="Password" autofocus
      style="padding:.7rem 1rem;border:1px solid #ddd;border-radius:8px;font-size:1rem;outline:none">
    <button type="submit"
      style="padding:.7rem;background:#D85A30;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:500">Enter</button>
    <div id="auth-error" style="color:#c0392b;font-size:.85rem;text-align:center;display:none">Wrong password</div>
  </form>
</div>
<main id="app" style="display:none"></main>

<nav id="tabs">
  <button class="tab active" data-tab="tools">Tools</button>
  <button class="tab" data-tab="words">Words</button>
  <button class="tab" data-tab="lessons">Packs</button>
  <button class="tab" data-tab="settings">Settings</button>
</nav>

<script>const PB_URL = '__PB_URL__';</script>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/pinyin.js"></script>
<script src="js/stats.js"></script>
<script src="js/views/tools.js"></script>
<script src="js/views/guide.js"></script>
<script src="js/views/words.js"></script>
<script src="js/views/lessons.js"></script>
<script src="js/views/settings.js"></script>
<script src="js/drills/tone-ear.js"></script>
<script src="js/drills/minimal-pairs.js"></script>
<script src="js/drills/word-decoder.js"></script>
<script src="js/drills/initial-final.js"></script>
<script src="js/drills/stroke-order.js"></script>
<script src="js/drills/radical-spotter.js"></script>
<script src="js/drills/pinyin-drill.js"></script>
<script src="js/drills/syllable-build.js"></script>
<script src="js/drills/word-spotter.js"></script>
<script src="js/drills/type-it.js"></script>
<script src="js/drills/dictation.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js"></script>
<script>
  // Auth gate — password hash injected by entrypoint.sh
  const AUTH_HASH = '__PASS_HASH__';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  (async () => {
    const gate = document.getElementById('auth-gate');
    const appEl = document.getElementById('app');
    const tabs = document.getElementById('tabs');

    // If no password configured, show app directly
    if (!AUTH_HASH || AUTH_HASH === '__PASS_HASH__') {
      gate.style.display = 'none';
      appEl.style.display = '';
      return;
    }

    const stored = sessionStorage.getItem('auth');
    if (stored === AUTH_HASH) {
      gate.style.display = 'none';
      appEl.style.display = '';
      return;
    }

    // Show gate, hide app
    gate.style.display = 'flex';
    appEl.style.display = 'none';
    if (tabs) tabs.style.display = 'none';

    document.getElementById('auth-form').addEventListener('submit', async e => {
      e.preventDefault();
      const hash = await sha256(document.getElementById('auth-input').value);
      if (hash === AUTH_HASH) {
        sessionStorage.setItem('auth', AUTH_HASH);
        sessionStorage.setItem('pb_cred', btoa(document.getElementById('auth-input').value));
        gate.style.display = 'none';
        appEl.style.display = '';
        if (tabs) tabs.style.display = '';
      } else {
        document.getElementById('auth-error').style.display = 'block';
        document.getElementById('auth-input').value = '';
      }
    });
  })();

  // Register Service Worker for offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
